<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koa API 示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 40px 20px;
      color: #333;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 32px;
      color: #1a1a2e;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .card h2 {
      margin-bottom: 16px;
      color: #16213e;
      font-size: 18px;
    }
    .card p {
      color: #666;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #4a90d9;
    }
    button {
      padding: 10px 24px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #357abd;
    }
    button:active {
      background: #2a5f9e;
    }
    .result {
      margin-top: 16px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
      border-left: 3px solid #4a90d9;
    }
    .result.show {
      display: block;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-right: 8px;
    }
    .badge-get { background: #d4edda; color: #155724; }
    .badge-post { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Koa API 请求示例</h1>

    <!-- GET 请求示例 -->
    <div class="card">
      <h2><span class="badge badge-get">GET</span>/api/hello</h2>
      <p>点击按钮发送 GET 请求，获取服务器问候信息。</p>
      <button id="btn-get" onclick="handleGetRequest()">发送 GET 请求</button>
      <div class="result" id="get-result"></div>
    </div>

    <!-- POST 请求示例 -->
    <div class="card">
      <h2><span class="badge badge-post">POST</span>/api/message</h2>
      <p>填写表单并发送 POST 请求，服务器将返回处理后的消息。</p>
      <div class="form-group">
        <label for="input-name">姓名</label>
        <input type="text" id="input-name" placeholder="请输入你的名字" value="小明">
      </div>
      <div class="form-group">
        <label for="input-content">消息内容</label>
        <input type="text" id="input-content" placeholder="请输入消息内容" value="你好，Koa！">
      </div>
      <button id="btn-post" onclick="handlePostRequest()">发送 POST 请求</button>
      <div class="result" id="post-result"></div>
    </div>
  </div>

  <script>
    // GET 请求处理
    const handleGetRequest = async () => {
      const resultEl = document.getElementById('get-result')
      resultEl.textContent = '请求中...'
      resultEl.classList.add('show')

      try {
        const response = await fetch('/api/hello')
        const data = await response.json()
        resultEl.textContent = JSON.stringify(data, null, 2)
      } catch (error) {
        resultEl.textContent = '请求失败: ' + error.message
      }
    }

    // POST 请求处理
    const handlePostRequest = async () => {
      const name = document.getElementById('input-name').value
      const content = document.getElementById('input-content').value
      const resultEl = document.getElementById('post-result')
      resultEl.textContent = '请求中...'
      resultEl.classList.add('show')

      try {
        const response = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, content })
        })
        const data = await response.json()
        resultEl.textContent = JSON.stringify(data, null, 2)
      } catch (error) {
        resultEl.textContent = '请求失败: ' + error.message
      }
    }
  </script>
</body>
</html>
